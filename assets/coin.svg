<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="coinGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#FFF3A0"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="80%"  stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#8B5E00"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="30%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Тень -->
  <ellipse cx="50" cy="58" rx="40" ry="8" fill="rgba(0,0,0,0.3)"/>
  <!-- Основное тело монеты -->
  <circle cx="50" cy="48" r="40" fill="url(#coinGrad)"/>
  <!-- Внутренний кант -->
  <circle cx="50" cy="48" r="35" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/>
  <!-- Символ ₮ -->
  <text x="50" y="62" text-anchor="middle" font-size="38" font-weight="bold"
        font-family="Georgia, serif" fill="rgba(120,70,0,0.6)">₮</text>
  <text x="50" y="60" text-anchor="middle" font-size="38" font-weight="bold"
        font-family="Georgia, serif" fill="#FFFDE0">₮</text>
  <!-- Блик -->
  <circle cx="50" cy="48" r="40" fill="url(#shineGrad)"/>
</svg>
